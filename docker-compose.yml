services:
  redpanda:
    image: redpandadata/redpanda:v25.2.7
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
      - --schema-registry-addr 0.0.0.0:8081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -qE 'Healthy:\\s+true'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - mototaxi

  redpanda-init:
    image: redpandadata/redpanda:v25.2.7
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/infra/redpanda-init.sh"]
    environment:
      PUSH_SERVER_REPLICAS: ${PUSH_SERVER_REPLICAS:-2}
      PARTITION_MULTIPLIER: ${PARTITION_MULTIPLIER:-2}
    volumes:
      - ./infra/redpanda-init.sh:/infra/redpanda-init.sh:ro
    networks:
      - mototaxi

  redpanda-console:
    image: redpandadata/console:v3.3.2
    restart: unless-stopped
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    networks:
      - mototaxi

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - mototaxi

  location-service:
    build:
      context: ./location-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    environment:
      REDIS_ADDR: redis:6379
      KAFKA_ADDR: redpanda:9092
      KAFKA_TOPIC: driver.location
    networks:
      - mototaxi
    # No host port mapping — Nginx fronts this service in Phase 5
    # Prometheus scrapes location-service:8080 internally (Phase 7)

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=native-histograms
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - mototaxi

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - mototaxi

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    command:
      - --kafka.server=redpanda:9092
    networks:
      - mototaxi

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    platform: linux/amd64
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - mototaxi

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - mototaxi

networks:
  mototaxi:
    driver: bridge
